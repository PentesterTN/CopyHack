<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 100" width="520" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00cc6a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="260" height="100" rx="12" fill="url(#bg)"/>
  <!-- Terminal cursor block -->
  <rect x="16" y="28" width="22" height="44" rx="3" fill="url(#accent)" opacity="0.9"/>
  <!-- > prompt -->
  <text x="21" y="60" font-family="monospace" font-size="28" font-weight="bold" fill="#0f0f0f">&gt;</text>
  <!-- CopyHack text -->
  <text x="48" y="60" font-family="monospace" font-size="34" font-weight="bold" fill="#e0e0e0">Copy</text>
  <text x="132" y="60" font-family="monospace" font-size="34" font-weight="bold" fill="url(#accent)">Hack</text>
  <!-- Subtitle -->
  <text x="48" y="80" font-family="monospace" font-size="11" fill="#666">500+ pentest one-liners</text>
  <!-- Blinking cursor -->
  <rect x="228" y="42" width="12" height="24" fill="url(#accent)" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
